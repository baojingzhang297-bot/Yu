<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>于系统后台管理演示</title>
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
  <style>
    :root {
      --brand: #1a3a5c;
      --brand-soft: #eaf0f6;
      --border: #d8e1ea;
      --bg: #f4f7fb;
      --text: #203142;
      --muted: #708195;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    #app {
      height: 100vh;
    }

    .app-shell {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      height: 64px;
      background: linear-gradient(135deg, #16324f 0%, #244d75 100%);
      color: var(--white);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      box-shadow: 0 8px 24px rgba(26, 58, 92, 0.18);
      z-index: 10;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand-mark {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .brand-text strong {
      display: block;
      font-size: 18px;
      line-height: 1.2;
    }

    .brand-text span {
      display: block;
      margin-top: 2px;
      font-size: 12px;
      opacity: 0.75;
    }

    .user-panel {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .user-meta {
      text-align: right;
      font-size: 13px;
      line-height: 1.4;
    }

    .layout-body {
      min-height: 0;
      flex: 1;
      display: flex;
    }

    .sidebar {
      background: var(--white);
      border-right: 1px solid var(--border);
      transition: width 0.2s ease;
      box-shadow: 0 12px 30px rgba(30, 52, 80, 0.04);
    }

    .sidebar-tools {
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 12px;
      border-bottom: 1px solid #eef3f8;
    }

    .menu-wrap {
      height: calc(100vh - 64px - 52px);
      overflow: auto;
      padding: 12px 8px 16px;
    }

    .main-panel {
      flex: 1;
      min-width: 0;
      padding: 24px;
      overflow: auto;
      background:
        radial-gradient(circle at top right, rgba(26, 58, 92, 0.08), transparent 30%),
        linear-gradient(180deg, #f8fbfe 0%, #f4f7fb 100%);
    }

    .page-card {
      background: var(--white);
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 18px 50px rgba(20, 42, 67, 0.08);
      border: 1px solid rgba(216, 225, 234, 0.75);
    }

    .page-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .page-head h2 {
      margin: 0;
      color: var(--brand);
      font-size: 26px;
      font-weight: 700;
    }

    .page-head p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .toolbar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: linear-gradient(180deg, #ffffff 0%, #f7fafe 100%);
      border: 1px solid #e7edf5;
      border-radius: 14px;
      padding: 16px 18px;
    }

    .stat-card .label {
      font-size: 13px;
      color: var(--muted);
    }

    .stat-card .value {
      margin-top: 10px;
      font-size: 28px;
      font-weight: 700;
      color: var(--brand);
    }

    .filter-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .section-title {
      margin: 26px 0 14px;
      font-size: 18px;
      color: var(--brand);
      font-weight: 700;
    }

    .el-menu {
      border-right: none;
    }

    .el-menu-item.is-active,
    .el-sub-menu .el-menu-item.is-active {
      background: var(--brand-soft);
      color: var(--brand);
      font-weight: 700;
    }

    .el-sub-menu .el-menu-item {
      padding-left: 64px !important;
    }

    .el-sub-menu__title {
      font-weight: 700;
    }

    .el-button--primary {
      --el-button-bg-color: var(--brand);
      --el-button-border-color: var(--brand);
      --el-button-hover-bg-color: #244d75;
      --el-button-hover-border-color: #244d75;
      --el-button-active-bg-color: #122b44;
      --el-button-active-border-color: #122b44;
    }

    .el-tag {
      border-radius: 999px;
      padding: 0 10px;
    }

    .case-search-panel {
      background: linear-gradient(180deg, #fbfdff 0%, #f5f8fc 100%);
      border: 1px solid #e4ebf3;
      border-radius: 16px;
      padding: 14px 16px;
      margin-bottom: 14px;
    }

    .case-search-grid {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .case-search-head {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      margin-bottom: 10px;
    }

    .search-toggle-btn {
      padding: 4px 6px;
      color: var(--brand);
    }

    .case-search-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px 16px;
    }

    .case-search-grid.compact .search-field:nth-child(n + 7) {
      display: none;
    }

    .search-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }

    .search-field.full-width {
      grid-column: 1 / -1;
    }

    .search-label {
      display: block;
      margin-bottom: 0;
      color: var(--brand);
      font-size: 12px;
      font-weight: 700;
      white-space: normal;
      text-align: left;
    }

    .ship-company-wrap {
      display: grid;
      grid-template-columns: 110px minmax(0, 1fr);
      gap: 8px;
    }

    .check-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 16px;
      min-height: 34px;
      align-items: center;
      padding: 4px 0;
    }

    .compact-input {
      max-width: 100%;
    }

    .compact-date-range {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
      gap: 8px;
      align-items: center;
    }

    .search-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 10px;
    }

    .case-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .table-note {
      color: var(--muted);
      font-size: 13px;
    }

    .case-table .cell {
      word-break: keep-all;
    }

    .operation-links {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 2px 8px;
      line-height: 1.4;
    }

    .action-link {
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      text-decoration: none;
      white-space: nowrap;
    }

    .case-link {
      color: var(--brand);
      font-weight: 700;
      text-decoration: underline;
    }

    .case-link:hover {
      text-decoration: underline;
    }

    .action-edit {
      color: #1a3a5c;
    }

    .action-copy {
      color: #227a52;
    }

    .action-view {
      color: #b06a00;
    }

    .action-delete {
      color: #c0392b;
    }

    .symbol-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 28px;
      height: 28px;
      padding: 0 8px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 13px;
      border: 1px solid #dbe4ee;
      background: #f8fbff;
    }

    .symbol-ok {
      color: #227a52;
      border-color: #cfe7db;
      background: #f2fbf6;
    }

    .symbol-partial {
      color: #b06a00;
      border-color: #ecd9af;
      background: #fff9eb;
    }

    .symbol-none {
      color: #7d8a98;
      border-color: #dde5ec;
      background: #f7f9fb;
    }

    .case-form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px 20px;
    }

    .sub-card {
      border: 1px solid #e4ebf3;
      border-radius: 16px;
      padding: 18px;
      background: #fbfdff;
    }

    .sub-card + .sub-card {
      margin-top: 18px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--brand);
      font-weight: 700;
      margin-bottom: 14px;
      cursor: pointer;
    }

    .form-card {
      border-radius: 18px;
      border: 1px solid rgba(216, 225, 234, 0.9);
      box-shadow: 0 18px 50px rgba(20, 42, 67, 0.08);
    }

    .form-section {
      padding-bottom: 20px;
      margin-bottom: 20px;
    }

    .form-section:last-child {
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .form-section.no-top-line {
      padding-top: 0;
      margin-top: 0;
    }

    .form-section-title {
      margin: 0 0 16px;
      padding-bottom: 10px;
      color: var(--brand);
      font-size: 18px;
      font-weight: 700;
      border-bottom: 2px solid #e8eef5;
    }

    .form-section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .section-toggle-btn {
      color: var(--brand);
      padding: 4px 6px;
    }

    .business-form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px 20px;
      padding: 16px;
      border-radius: 14px;
      background: #f7fafe;
      border: 1px solid #e6edf5;
    }

    .business-form-grid .el-form-item {
      margin-bottom: 14px;
    }

    .business-form-grid .full-row {
      grid-column: 1 / -1;
    }

    .item-name-left .el-form-item__label {
      text-align: left;
      justify-content: flex-start;
    }

    .plain-form-grid {
      padding: 0;
      background: transparent;
      border: none;
      border-radius: 0;
    }

    .inline-pair {
      display: grid;
      grid-template-columns: 120px minmax(0, 1fr);
      gap: 8px;
      width: 100%;
    }

    .inline-triple {
      display: grid;
      grid-template-columns: 100px minmax(0, 1fr) minmax(0, 1fr);
      gap: 8px;
      width: 100%;
    }

    .address-block {
      display: grid;
      grid-template-columns: 140px minmax(0, 1fr);
      gap: 8px;
      width: 100%;
    }

    .new-case-table {
      margin-top: 14px;
    }

    .new-case-table .el-table__header th {
      background: #eef4fb;
      color: var(--brand);
    }

    .finance-list-table .el-table__header th {
      background: #eef4fb;
      color: var(--brand);
    }

    .currency-group {
      display: flex;
      flex-wrap: nowrap;
      gap: 8px;
      white-space: nowrap;
    }

    .ocr-cell {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
    }

    .ocr-dialog-layout {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 18px;
      min-height: 420px;
    }

    .ocr-upload-box,
    .ocr-preview-box,
    .ocr-result-box {
      border: 1px solid #e4ebf3;
      border-radius: 14px;
      background: #fbfdff;
    }

    .ocr-upload-box {
      padding: 16px;
      margin-bottom: 14px;
    }

    .ocr-preview-box {
      min-height: 320px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 12px;
    }

    .ocr-preview-box img,
    .ocr-preview-box iframe,
    .ocr-preview-box embed {
      width: 100%;
      height: 320px;
      object-fit: contain;
      border: none;
      background: #fff;
    }

    .ocr-result-box {
      padding: 16px;
    }

    .ocr-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-top: 14px;
    }

    .finance-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px 16px;
    }

    .finance-search-panel {
      margin-bottom: 14px;
      padding: 16px;
      border-radius: 14px;
      background: #f7fafe;
      border: 1px solid #e6edf5;
    }

    .finance-grid .search-field {
      gap: 8px;
    }

    .finance-search-panel .search-actions {
      margin-top: 8px;
      padding-top: 0;
    }

    .finance-summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin-top: 18px;
    }

    .finance-stat {
      padding: 16px;
      border: 1px solid #e4ebf3;
      border-radius: 14px;
      background: linear-gradient(180deg, #ffffff 0%, #f7fafe 100%);
    }

    .finance-stat .label {
      color: var(--muted);
      font-size: 13px;
    }

    .finance-stat .value {
      margin-top: 8px;
      color: var(--brand);
      font-size: 24px;
      font-weight: 700;
    }

    .drawer-block + .drawer-block {
      margin-top: 18px;
    }

    .drawer-block h4 {
      margin: 0 0 10px;
      color: var(--brand);
      font-size: 16px;
    }

    .drawer-table-wrap {
      overflow-x: auto;
      padding-bottom: 6px;
    }

    .drawer-table-wrap .el-table {
      min-width: 860px;
    }

    .link-button {
      color: var(--brand);
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }

    .finance-form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px 20px;
      padding: 16px;
      border-radius: 14px;
      background: #f7fafe;
      border: 1px solid #e6edf5;
    }

    .finance-form-grid .full-row {
      grid-column: 1 / -1;
    }

    .finance-tools {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin: 14px 0 10px;
    }

    .finance-calc-grid {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 16px;
      padding: 16px;
      border-radius: 14px;
      background: #f7fafe;
      border: 1px solid #e6edf5;
    }

    .rate-pair {
      display: grid;
      grid-template-columns: repeat(2, 160px);
      gap: 10px;
    }

    .rate-field {
      max-width: 160px;
    }

    .calc-inline-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      align-items: stretch;
    }

    .calc-item {
      min-width: 0;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid #e1e8f0;
      background: #ffffff;
    }

    .calc-item .label {
      color: var(--muted);
      font-size: 12px;
    }

    .calc-item .value {
      margin-top: 6px;
      color: var(--brand);
      font-size: 22px;
      font-weight: 700;
    }

    .billing-form-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 4px 12px;
      padding: 12px 14px;
      border-radius: 14px;
      background: #f7fafe;
      border: 1px solid #e6edf5;
    }

    .billing-form-grid .el-form-item {
      margin-bottom: 10px;
    }

    .billing-form-grid .full-row {
      grid-column: 1 / -1;
    }

    .currency-pair {
      display: grid;
      grid-template-columns: 110px 120px;
      gap: 8px;
      align-items: center;
      width: 100%;
    }

    .currency-quad {
      display: grid;
      grid-template-columns: 110px 120px 110px 120px;
      gap: 8px;
      align-items: center;
      width: 100%;
    }

    .settlement-row {
      display: grid;
      grid-template-columns: auto 240px auto auto 140px;
      gap: 12px;
      align-items: center;
      width: 100%;
    }

    .settlement-inline-label {
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      line-height: 32px;
      justify-self: end;
      white-space: nowrap;
    }

    .detail-case-picker {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
    }

    .income-radio-row {
      display: flex;
      align-items: center;
      min-height: 32px;
    }

    .case-select-table .el-button {
      min-width: 72px;
    }

    .billing-summary-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .template-options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .master-dictionary {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 18px;
    }

    .master-side {
      border: 1px solid #e4ebf3;
      border-radius: 14px;
      background: #fbfdff;
      padding: 12px;
    }

    .master-detail {
      border: 1px solid #e4ebf3;
      border-radius: 14px;
      background: #fbfdff;
      padding: 14px;
    }

    .case-picker-row {
      display: grid;
      grid-template-columns: 240px auto;
      gap: 10px;
      align-items: center;
    }

    .new-case-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-top: 14px;
    }

    .bottom-actions {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-top: 28px;
    }

    .case-table .el-table__cell {
      padding: 8px 0;
    }

    .case-table .el-table__header th {
      font-size: 12px;
    }

    .case-table .el-table__body td {
      font-size: 12px;
    }

    @media (max-width: 900px) {
      .topbar {
        padding: 0 14px;
      }

      .brand-text span,
      .user-meta {
        display: none;
      }

      .main-panel {
        padding: 14px;
      }

      .page-card {
        padding: 16px;
        border-radius: 14px;
      }

      .page-head {
        flex-direction: column;
        align-items: flex-start;
      }

      .case-search-grid,
      .case-form-grid,
      .business-form-grid,
      .finance-grid,
      .finance-form-grid,
      .finance-calc-grid,
      .finance-summary,
      .calc-inline-grid,
      .billing-form-grid,
      .billing-summary-grid,
      .master-dictionary {
        grid-template-columns: 1fr;
      }

      .case-search-grid,
      .search-field {
        grid-template-columns: 1fr;
      }

      .ship-company-wrap,
      .inline-pair,
      .inline-triple,
      .address-block,
      .rate-pair,
      .case-picker-row {
        grid-template-columns: 1fr;
      }

      .compact-date-range {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.prod.js"></script>
  <script src="https://unpkg.com/element-plus/dist/index.full.min.js"></script>
  <script src="https://unpkg.com/@element-plus/icons-vue/dist/index.iife.min.js"></script>
  <script>
    const {
      House,
      Briefcase,
      Money,
      Bell,
      Setting,
      User,
      Fold,
      Expand,
      Search,
      Plus,
      Document,
      Calendar,
      Check,
      Warning,
      ArrowLeft,
      Delete
    } = ElementPlusIconsVue;

    const caseRows = [
      {
        no: 1,
        caseNo: "B101ES26000001",
        etd: "2026/03/08",
        eta: "2026/03/15",
        shippingCompany: "WAN\nHAI LINES",
        destination: "KOLKATA, INDIA",
        workplace: "岩并化成",
        bookingNo: "008GX09338",
        blNo: "008GX09338",
        containerNo: "WHSU6329391",
        invoiceIssued: "○",
        paymentStatus: "○",
        surrenderStatus: "○",
        containerCount: 10
      },
      {
        no: 2,
        caseNo: "B101ES26000002",
        etd: "2026/03/08",
        eta: "2026/03/15",
        shippingCompany: "WAN\nHAI LINES",
        destination: "KOLKATA, INDIA",
        workplace: "岩并化成",
        bookingNo: "008GX09337",
        blNo: "008GX09337",
        containerNo: "WHSU6329392",
        invoiceIssued: "-",
        paymentStatus: "△",
        surrenderStatus: "○",
        containerCount: 20
      },
      {
        no: 3,
        caseNo: "B101ES26000003",
        etd: "2026/03/08",

        const visible = Vue.ref(false);
        const makeItem = (item = {}, index = 0) => ({
          no: index + 1,
          code: item.code ?? "",
          name: item.name ?? ""
        });
        const editing = Vue.reactive({ no: null, code: "", name: "", type: "", items: [] });
        const openNew = () => {
          Object.assign(editing, { no: null, code: "", name: "", type: "", items: [makeItem({}, 0)] });
          visible.value = true;
        };
        const editRow = (row) => {
          Object.assign(editing, {
            no: row.no,
            code: row.code,
            name: row.name,
            type: row.type,
            items: row.items.map((item, index) => makeItem(item, index))
          });
          visible.value = true;
        };
        const appendItem = () => editing.items.push(makeItem({}, editing.items.length));
        const removeItem = (index) => {
          editing.items.splice(index, 1);
          editing.items.forEach((item, itemIndex) => { item.no = itemIndex + 1; });
        };
        const formatItems = (items) => items.map(item => `${item.code}:${item.name}`).join(" / ");
        const save = () => {
          const payload = {
            no: editing.no ?? rows.length + 1,
            code: editing.code,
            name: editing.name,
            type: editing.name,
            items: editing.items.map((item, index) => ({ no: index + 1, code: item.code, name: item.name }))
          };
          if (editing.no) rows[rows.findIndex(item => item.no === editing.no)] = payload;
          else rows.push(payload);
          visible.value = false;
        };
        return { filters, filteredRows, visible, editing, Search, Plus, Delete, openNew, editRow, appendItem, removeItem, formatItems, save };
      }
    };
